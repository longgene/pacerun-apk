<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="theme-color" content="#FF8C42" />
<title>PaceRun 下载</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;
    background:linear-gradient(160deg,#1b1b1f,#161618);color:#fff;min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:380px;background:#222228;border:1px solid #33333b;border-radius:22px;
    padding:30px 24px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.45)}
  .logo{width:74px;height:74px;border-radius:20px;background:linear-gradient(135deg,#FF8C42,#FFB347);
    display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 14px}
  h1{font-size:24px;margin:6px 0 2px}
  .sub{color:#9aa0a6;font-size:13px;margin-bottom:18px}
  .feat{text-align:left;background:#19191e;border-radius:14px;padding:14px 16px;margin:14px 0;font-size:13px;color:#cfd3d8;line-height:1.9}
  .feat b{color:#FF8C42}
  .btn{display:block;width:100%;padding:15px;border-radius:14px;border:none;font-size:16px;font-weight:700;
    background:linear-gradient(135deg,#FF8C42,#FFB347);color:#1b1b1f;text-decoration:none;margin-top:8px}
  .note{font-size:12px;color:#7b818a;margin-top:14px;line-height:1.7}
  .qr{width:128px;height:128px;margin:16px auto 4px;border-radius:12px;background:#fff;padding:6px}
  .ver{display:inline-block;background:#2c2c34;color:#FFB347;font-size:12px;padding:3px 10px;border-radius:20px;margin-bottom:6px}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">🏃</div>
    <span class="ver" id="ver">v1.0.0</span>
    <h1>PaceRun 运动健身</h1>
    <div class="sub">安卓安装包 · 完整功能版</div>
    <div class="feat">
      ✅ <b>注册/登录</b>：邮箱 · 手机号 · 微信(演示)<br/>
      🏃 <b>跑步</b>：实时计时/距离/配速/心率<br/>
      🛰️ <b>GPS</b>：高精度定位 + 轨迹可视化<br/>
      📋 <b>计划</b>：自定义 + 导入 + 详情弹窗<br/>
      ⌚ <b>手表</b>：真实 BLE 心率同步
    </div>
    <a class="btn" href="app-release.apk">⬇ 下载安装包 (APK)</a>
    <img class="qr" id="qr" alt="扫码下载" />
    <div class="note">
      安卓手机：点击下载后用浏览器打开，允许「未知来源」安装即可。<br/>
      数据保存在本机，离线可用。当前为自签名正式包（debug 签名仅供体验）。
    </div>
  </div>
  <script>
    document.getElementById("ver").textContent = "v" + (location.search.match(/v=([\d.]+)/)||[])[1] || "v1.0.0";
    var u = encodeURIComponent(location.href.split("#")[0]);
    document.getElementById("qr").src = "https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=" + u;
  </script>
</body>
</html>
